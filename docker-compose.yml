services:
  postgres:
    image: timescale/timescaledb:2.14.2-pg16
    container_name: quant-postgres
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant
      POSTGRES_DB: quant
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: quant-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: quant-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio_data:/data

  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: quant-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    container_name: quant-mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://quant:quant@postgres:5432/mlflow --default-artifact-store s3://mlflow-artifacts/
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - ./mlflow_data:/mlflow

  mc-init:
    image: minio/mc:RELEASE.2024-06-13T22-53-53Z
    container_name: quant-mc-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minio minio123) do sleep 1; done;
      /usr/bin/mc mb -p local/mlflow-artifacts;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  mlflow_data:
